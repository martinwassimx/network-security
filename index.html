<!doctype html>
<html lang="en" class="">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StudyMartin &mdash; Computer Security Study Platform</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: { brand: {50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e'} },
      fontFamily: { sans: ['Inter','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] }
    } }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;}
  body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .animate-fadeIn{animation:fadeIn .4s ease both}
  .animate-slideUp{animation:slideUp .45s ease both}
  .animate-pop{animation:pop .35s ease}
  .animate-shake{animation:shake .4s ease}
  .animate-floaty{animation:floaty 6s ease-in-out infinite}
  .hero-bg{background:linear-gradient(135deg,#e0f2fe 0%,#f0f9ff 45%,#ecfeff 100%)}
  .dark .hero-bg{background:linear-gradient(135deg,rgba(14,165,233,.16) 0%,rgba(2,132,199,.10) 50%,rgba(8,47,73,.30) 100%)}
  .gradient-text{background:linear-gradient(90deg,#0ea5e9,#06b6d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  ::selection{background:#bae6fd;color:#0c4a6e}
  .card-hover{transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease}
  .card-hover:hover{transform:translateY(-4px)}
  *{scrollbar-width:thin}
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
<div id="root"></div>

<script src="data/chapters.js"></script>
<script src="data/questions.js"></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo} = React;

const CHAPTERS = window.CHAPTERS || [];
const QUESTIONS = window.QUESTIONS || {};
const LETTERS = ['A','B','C','D','E','F'];
const FINAL_SECONDS = 45*60;

/* ---------------- storage ---------------- */
const STORE_KEY='studymartin_v1';
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {scores:{},completed:{}}; }catch(e){ return {scores:{},completed:{}}; } }
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }

/* ---------------- sound feedback ---------------- */
let _actx=null;
function beep(ok){ try{ _actx=_actx||new (window.AudioContext||window.webkitAudioContext)(); const o=_actx.createOscillator(),g=_actx.createGain(); o.connect(g); g.connect(_actx.destination); o.type='sine'; o.frequency.value=ok?660:175; const t=_actx.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.28); o.start(t); o.stop(t+0.3); }catch(e){} }

/* ---------------- helpers ---------------- */
function shuffle(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=r[i]; r[i]=r[j]; r[j]=tmp; } return r; }
function fmtTime(s){ if(s<0) s=0; const m=Math.floor(s/60), sec=s%60; return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec; }
function pct(n,d){ return d?Math.round((n/d)*100):0; }
function chapterById(id){ return CHAPTERS.find(c=>c.id===id); }

/* ---------------- search text ---------------- */
function sectionText(s){
  let parts=[];
  ['text','term','title','caption'].forEach(k=>{ if(s[k]) parts.push(s[k]); });
  if(s.items) parts=parts.concat(s.items);
  if(s.lines) parts=parts.concat(s.lines);
  if(s.headers) parts=parts.concat(s.headers);
  if(s.rows) s.rows.forEach(r=>{ parts=parts.concat(r); });
  if(s.left){ if(s.left.title) parts.push(s.left.title); parts=parts.concat(s.left.points||[]); }
  if(s.right){ if(s.right.title) parts.push(s.right.title); parts=parts.concat(s.right.points||[]); }
  return parts.filter(Boolean).join('  ');
}
function sectionHeading(ch,i){ for(let j=i;j>=0;j--){ if(ch.sections[j].type==='h2') return ch.sections[j].text; } return ch.title; }

/* ---------------- highlight ---------------- */
function highlight(text,q){
  if(!q) return text;
  try{
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    const parts=String(text).split(re);
    return parts.map((p,i)=> (i%2===1)
      ? <mark key={i} className="bg-amber-200 dark:bg-amber-400/40 rounded px-0.5">{p}</mark>
      : <span key={i}>{p}</span>);
  }catch(e){ return text; }
}

/* ---------------- icons (SVG, no emoji) ---------------- */
function Icon({name,className}){
  const c=className||'w-5 h-5';
  const paths={
    home:'M3 11.5 12 4l9 7.5M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9',
    book:'M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2V5zM18 3v16',
    exam:'M9 4h6a1 1 0 0 1 1 1v0h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h1a1 1 0 0 1 1-1zM9 12l2 2 4-4',
    search:'M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm10 2-4.3-4.3',
    sun:'M12 4V2m0 20v-2m8-8h2M2 12h2m13.66 5.66 1.41 1.41M4.93 4.93l1.41 1.41m0 11.32-1.41 1.41M19.07 4.93l-1.41 1.41M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z',
    moon:'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z',
    clock:'M12 7v5l3 2m6-2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z',
    check:'M5 13l4 4L19 7',
    x:'M6 6l12 12M18 6 6 18',
    arrow:'M5 12h14m-6-6 6 6-6 6',
    refresh:'M21 12a9 9 0 1 1-3-6.7M21 4v4h-4',
    shuffle:'M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5',
    shield:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
    lock:'M5 11a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1zM8 10V7a4 4 0 0 1 8 0v3',
    key:'M14 7a4 4 0 1 0-3.9 5L4 18v2h2l1-1h2v-2h2v-2l1.1-1.1A4 4 0 0 0 14 7z',
    clipboard:'M9 4h6a1 1 0 0 1 1 1v1H8V5a1 1 0 0 1 1-1zM8 6H6a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-2M9 11h6M9 15h6',
    bulb:'M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.3 1 2.1V16h6v-.4c0-.8.4-1.5 1-2.1A6 6 0 0 0 12 3z',
    info:'M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18zM12 11v5M12 7.5h.01',
    alert:'M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18zM12 8v5M12 16.5h.01',
    warn:'M12 3l9 16H3L12 3zM12 10v4M12 17.5h.01',
    beaker:'M9 3h6M10 3v6l-5 9a1 1 0 0 0 .9 1.5h12.2A1 1 0 0 0 19 18l-5-9V3',
    sparkle:'M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z',
    trophy:'M8 4h8v4a4 4 0 0 1-8 0V4zM8 6H5a2 2 0 0 0 0 4h1M16 6h3a2 2 0 0 1 0 4h-1M10 14h4l-1 4h-2l-1-4zM8 21h8',
    cap:'M22 9L12 5 2 9l10 4 10-4zM6 11v5c0 1 2.7 3 6 3s6-2 6-3v-5',
    target:'M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18zM12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
    bolt:'M13 2L4 14h7l-1 8 9-12h-7l1-8z'
  };
  return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d={paths[name]} /></svg>);
}

const CHAP_ICON={ch1:'shield',ch2:'lock',ch3:'clipboard',ch4:'key'};
function chapIcon(id){ return CHAP_ICON[id]||'book'; }

/* ---------------- progress bar ---------------- */
function ProgressBar({value}){
  const [w,setW]=useState(0);
  const fillStyle={width:w+'%'};
  useEffect(()=>{ const t=setTimeout(()=>setW(value),60); return ()=>clearTimeout(t); },[value]);
  return (<div className="h-2.5 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div className="h-full rounded-full bg-gradient-to-r from-brand-400 to-cyan-400 transition-all duration-700" style={fillStyle}></div></div>);
}

/* ---------------- callout tones ---------------- */
const TONES={
  important:{bd:'border-brand-400',bg:'bg-brand-50 dark:bg-brand-500/10',label:'Important',tx:'text-brand-700 dark:text-brand-300',icon:'alert'},
  tip:{bd:'border-emerald-400',bg:'bg-emerald-50 dark:bg-emerald-500/10',label:'Tip',tx:'text-emerald-700 dark:text-emerald-300',icon:'bulb'},
  example:{bd:'border-violet-400',bg:'bg-violet-50 dark:bg-violet-500/10',label:'Example',tx:'text-violet-700 dark:text-violet-300',icon:'beaker'},
  note:{bd:'border-sky-400',bg:'bg-sky-50 dark:bg-sky-500/10',label:'Note',tx:'text-sky-700 dark:text-sky-300',icon:'info'},
  warning:{bd:'border-rose-400',bg:'bg-rose-50 dark:bg-rose-500/10',label:'Warning',tx:'text-rose-700 dark:text-rose-300',icon:'warn'}
};

/* ---------------- section renderer ---------------- */
function Section({s}){
  switch(s.type){
    case 'intro':
      return <p className="text-lg leading-relaxed text-slate-600 dark:text-slate-300 border-l-4 border-brand-400 pl-4 my-6">{s.text}</p>;
    case 'h2':
      return <h2 className="text-2xl font-bold mt-10 mb-3 text-slate-900 dark:text-white scroll-mt-24">{s.text}</h2>;
    case 'h3':
      return <h3 className="text-lg font-semibold mt-6 mb-2 text-brand-700 dark:text-brand-300">{s.text}</h3>;
    case 'p':
      return <p className="my-3 leading-relaxed text-slate-700 dark:text-slate-300">{s.text}</p>;
    case 'definition':
      return (<div className="my-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/60 p-4 flex gap-3"><Icon name="book" className="w-5 h-5 mt-0.5 flex-none text-brand-500" /><div><span className="font-semibold text-brand-700 dark:text-brand-300">{s.term}: </span><span className="text-slate-700 dark:text-slate-300">{s.text}</span></div></div>);
    case 'list': {
      return (<div className="my-4">{s.title && <div className="font-semibold mb-2 text-slate-800 dark:text-slate-100">{s.title}</div>}<ul className="space-y-2">{s.items.map((it,i)=>(<li key={i} className="flex gap-3 text-slate-700 dark:text-slate-300">{s.ordered ? <span className="flex-none w-5 h-5 mt-0.5 rounded-full bg-brand-100 dark:bg-brand-500/20 text-brand-700 dark:text-brand-300 text-xs font-bold grid place-items-center">{i+1}</span> : <span className="flex-none mt-2 w-1.5 h-1.5 rounded-full bg-brand-400"></span>}<span>{it}</span></li>))}</ul></div>);
    }
    case 'steps': {
      return (<div className="my-5">{s.title && <div className="font-semibold mb-3 text-slate-800 dark:text-slate-100">{s.title}</div>}<ol className="space-y-3">{s.items.map((it,i)=>(<li key={i} className="flex gap-3"><span className="flex-none w-7 h-7 rounded-full bg-gradient-to-br from-brand-500 to-cyan-500 text-white text-sm font-bold grid place-items-center shadow-sm">{i+1}</span><span className="pt-0.5 text-slate-700 dark:text-slate-300">{it}</span></li>))}</ol></div>);
    }
    case 'callout': case 'example': {
      const tone = s.type==='example' ? TONES.example : (TONES[s.tone]||TONES.note);
      const label = s.type==='example' ? 'Example' : tone.label;
      return (<div className={'my-4 rounded-xl border-l-4 p-4 '+tone.bd+' '+tone.bg}><div className={'flex items-center gap-1.5 text-xs font-bold uppercase tracking-wide mb-1 '+tone.tx}><Icon name={tone.icon} className="w-4 h-4" /><span>{label}{s.title?' · '+s.title:''}</span></div><div className="text-slate-700 dark:text-slate-200 leading-relaxed">{s.text}</div></div>);
    }
    case 'comparison':
      return (<div className="my-5">{s.title && <div className="font-semibold mb-3 text-slate-800 dark:text-slate-100">{s.title}</div>}<div className="grid md:grid-cols-2 gap-4">{[s.left,s.right].map((col,ci)=>(<div key={ci} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/60 p-4"><div className="font-semibold text-brand-700 dark:text-brand-300 mb-2">{col.title}</div><ul className="space-y-2">{(col.points||[]).map((p,pi)=>(<li key={pi} className="flex gap-2 text-sm text-slate-700 dark:text-slate-300"><span className="flex-none mt-1.5 w-1.5 h-1.5 rounded-full bg-brand-400"></span><span>{p}</span></li>))}</ul></div>))}</div></div>);
    case 'table':
      return (<div className="my-5">{s.title && <div className="text-sm font-semibold mb-2 text-slate-500 dark:text-slate-400">{s.title}</div>}<div className="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-800"><table className="w-full text-sm"><thead className="bg-brand-50 dark:bg-brand-500/10"><tr>{s.headers.map((h,i)=>(<th key={i} className="text-left font-semibold px-3 py-2 text-brand-800 dark:text-brand-200">{h}</th>))}</tr></thead><tbody>{s.rows.map((r,ri)=>(<tr key={ri} className="border-t border-slate-100 dark:border-slate-800 even:bg-slate-50/60 dark:even:bg-white/5">{r.map((c,ci)=>(<td key={ci} className="px-3 py-2 align-top text-slate-700 dark:text-slate-300">{c}</td>))}</tr>))}</tbody></table></div></div>);
    case 'formula':
      return (<div className="my-5 rounded-xl border border-brand-200 dark:border-brand-500/30 bg-brand-50/70 dark:bg-brand-500/10 p-4">{s.title && <div className="text-sm font-semibold mb-2 text-brand-700 dark:text-brand-300">{s.title}</div>}<pre className="font-mono text-sm whitespace-pre-wrap text-slate-800 dark:text-slate-100">{s.lines.join('\n')}</pre>{s.caption && <div className="text-xs mt-3 text-slate-500 dark:text-slate-400">{s.caption}</div>}</div>);
    case 'summary':
      return (<div className="my-8 rounded-2xl border border-brand-200 dark:border-brand-500/30 bg-gradient-to-br from-brand-50 to-cyan-50 dark:from-brand-500/10 dark:to-cyan-500/5 p-6"><div className="flex items-center gap-2 mb-3"><Icon name="check" className="w-5 h-5 text-brand-600 dark:text-brand-300" /><span className="font-bold text-lg text-slate-900 dark:text-white">{s.title}</span></div><ul className="space-y-2">{s.items.map((it,i)=>(<li key={i} className="flex gap-3 text-slate-700 dark:text-slate-200"><Icon name="check" className="w-4 h-4 mt-1 flex-none text-brand-500" /><span>{it}</span></li>))}</ul></div>);
    default: return null;
  }
}

/* ---------------- sidebar ---------------- */
function Sidebar({view,chId,go,open,setOpen}){
  const items=[{v:'home',id:null,label:'Home',icon:'home'}];
  CHAPTERS.forEach(c=>items.push({v:'chapter',id:c.id,label:'Chapter '+c.num,icon:chapIcon(c.id)}));
  items.push({v:'final',id:null,label:'Final Exam',icon:'exam'});
  const wrap='fixed md:static z-40 top-0 left-0 h-full w-64 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-4 flex flex-col transition-transform duration-300 '+(open?'translate-x-0':'-translate-x-full md:translate-x-0');
  return (<aside className={wrap}>
    <div className="flex items-center gap-2.5 px-2 py-2 mb-4">
      <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-cyan-400 grid place-items-center text-white font-extrabold shadow-md">SM</div>
      <div className="font-extrabold text-lg tracking-tight">Study<span className="gradient-text">Martin</span></div>
    </div>
    <nav className="space-y-1 flex-1">
      {items.map((it,i)=>{ const active = it.v===view && (it.id?it.id===chId:true) && !(view==='chapter'&&it.v!=='chapter'); const isActive = (view===it.v) && ((it.v==='chapter') ? it.id===chId : true);
        return (<button key={i} onClick={()=>{go(it.v,it.id); setOpen(false);}} className={'w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition '+(isActive?'bg-brand-500 text-white shadow-sm':'text-slate-600 dark:text-slate-300 hover:bg-brand-50 dark:hover:bg-slate-800')}>
          <Icon name={it.icon} className="w-5 h-5" />
          <span className="truncate text-left">{it.label}</span>
        </button>);
      })}
    </nav>
    <div className="text-xs text-slate-400 px-3 pt-3 border-t border-slate-100 dark:border-slate-800">Computer &amp; Information Security</div>
  </aside>);
}

/* ---------------- topbar ---------------- */
function Topbar({query,setQuery,go,dark,setDark,setOpen}){
  return (<header className="sticky top-0 z-30 bg-white/80 dark:bg-slate-950/80 backdrop-blur border-b border-slate-200 dark:border-slate-800">
    <div className="flex items-center gap-3 px-4 md:px-8 h-16">
      <button className="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" onClick={()=>setOpen(true)}><Icon name="book" /></button>
      <div className="relative flex-1 max-w-xl">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" className="w-4 h-4" /></span>
        <input value={query} onChange={e=>{ const v=e.target.value; setQuery(v); go(v?'search':'home'); }} placeholder="Search explanations and questions..." className="w-full pl-9 pr-9 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-900 border border-transparent focus:border-brand-400 focus:bg-white dark:focus:bg-slate-900 outline-none text-sm transition" />
        {query && <button onClick={()=>{setQuery('');go('home');}} className="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600"><Icon name="x" className="w-4 h-4" /></button>}
      </div>
      <button onClick={()=>setDark(!dark)} className="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-900 hover:bg-brand-100 dark:hover:bg-slate-800 transition" title="Toggle theme"><Icon name={dark?'sun':'moon'} className="w-5 h-5" /></button>
    </div>
  </header>);
}

/* ---------------- home ---------------- */
function Home({go,store}){
  const totalQ = Object.keys(QUESTIONS).reduce((a,k)=>a+QUESTIONS[k].length,0);
  const doneCount = CHAPTERS.filter(c=>store.completed[c.id]).length;
  return (<div className="animate-fadeIn">
    <div className="hero-bg rounded-3xl px-8 py-14 text-center relative overflow-hidden">
      <div className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/70 dark:bg-white/10 text-xs font-semibold text-brand-700 dark:text-brand-200 mb-4"><Icon name="sparkle" className="w-4 h-4" />Network &amp; Information Security</div>
      <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 dark:text-white">Study smarter with <span className="gradient-text">StudyMartin</span></h1>
      <p className="text-lg text-slate-600 dark:text-slate-300 mt-4 max-w-2xl mx-auto">Four chapters turned into complete, beginner-friendly study guides, plus {totalQ} practice questions with instant explanations and a timer on every quiz.</p>
      <div className="mt-7 flex flex-wrap gap-3 justify-center">
        <button onClick={()=>go('chapter','ch1')} className="px-5 py-3 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold shadow-md shadow-brand-500/20 transition">Start Chapter 1</button>
        <button onClick={()=>go('final')} className="px-5 py-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-semibold hover:border-brand-400 transition">Take Final Exam</button>
      </div>
    </div>

    <div className="grid sm:grid-cols-3 gap-4 mt-8">
      <StatCard icon="cap" label="Chapters" value={CHAPTERS.length} sub={doneCount+' completed'} />
      <StatCard icon="target" label="Practice questions" value={totalQ} sub="50 per chapter" />
      <StatCard icon="trophy" label="Final exam" value={(QUESTIONS.final||[]).length} sub="45-minute timer" />
    </div>

    <h2 className="text-xl font-bold mt-10 mb-4">Chapters</h2>
    <div className="grid md:grid-cols-2 gap-4">
      {CHAPTERS.map((c,i)=>{ const sc=store.scores[c.id]; const stStyle={animationDelay:(i*70)+'ms'};
        return (<div key={c.id} style={stStyle} className="animate-slideUp card-hover rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 hover:shadow-xl hover:border-brand-300 dark:hover:border-brand-500/40">
          <div className="flex items-start gap-4">
            <div className="relative flex-none w-12 h-12 rounded-2xl bg-gradient-to-br from-brand-500 to-cyan-400 text-white grid place-items-center shadow-md"><Icon name={chapIcon(c.id)} className="w-6 h-6" /><span className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-white text-brand-600 text-xs font-extrabold grid place-items-center shadow">{c.num}</span></div>
            <div className="flex-1 min-w-0">
              <div className="font-bold text-lg leading-snug">{c.title}</div>
              <div className="text-sm text-slate-500 dark:text-slate-400 mt-1">{c.subtitle}</div>
              <div className="flex items-center gap-3 mt-3 text-xs text-slate-400"><span className="flex items-center gap-1"><Icon name="clock" className="w-4 h-4" />{c.readMins} min read</span><span>{QUESTIONS[c.id].length} questions</span>{sc && <span className="text-brand-600 dark:text-brand-300 font-semibold">Best {pct(sc.best,sc.total)}%</span>}</div>
              <div className="flex gap-2 mt-4">
                <button onClick={()=>go('chapter',c.id)} className="px-4 py-2 rounded-lg bg-brand-50 dark:bg-brand-500/15 text-brand-700 dark:text-brand-200 text-sm font-semibold hover:bg-brand-100 dark:hover:bg-brand-500/25 transition">Read</button>
                <button onClick={()=>go('quiz',c.id)} className="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold transition">Quiz</button>
              </div>
            </div>
          </div>
        </div>);
      })}
    </div>

    <div className="mt-8 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6">
      <div className="flex items-center justify-between mb-4"><h2 className="text-xl font-bold">Your progress</h2><span className="text-sm text-slate-400">{doneCount}/{CHAPTERS.length} chapters done</span></div>
      <div className="space-y-4">
        {CHAPTERS.map(c=>{ const sc=store.scores[c.id]; return (<div key={c.id}><div className="flex justify-between text-sm mb-1"><span className="font-medium">Ch {c.num}. {c.title}</span><span className="text-slate-400">{sc?pct(sc.best,sc.total)+'%':'not attempted'}</span></div><ProgressBar value={sc?pct(sc.best,sc.total):0} /></div>); })}
        {QUESTIONS.final && (()=>{ const sc=store.scores.final; return (<div><div className="flex justify-between text-sm mb-1"><span className="font-medium">Final Exam</span><span className="text-slate-400">{sc?pct(sc.best,sc.total)+'%':'not attempted'}</span></div><ProgressBar value={sc?pct(sc.best,sc.total):0} /></div>); })()}
      </div>
    </div>
  </div>);
}
function StatCard({icon,label,value,sub}){
  return (<div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5"><div className="flex items-center gap-3"><div className="flex-none w-11 h-11 rounded-xl bg-brand-50 dark:bg-brand-500/15 text-brand-600 dark:text-brand-300 grid place-items-center"><Icon name={icon} className="w-6 h-6" /></div><div><div className="text-2xl font-extrabold text-brand-600 dark:text-brand-300 leading-none">{value}</div><div className="font-semibold text-sm mt-1">{label}</div></div></div><div className="text-xs text-slate-400 mt-2">{sub}</div></div>);
}

/* ---------------- chapter view ---------------- */
function ChapterView({ch,go,store}){
  const sc=store.scores[ch.id];
  return (<div className="animate-fadeIn max-w-3xl mx-auto">
    <div className="flex items-center gap-3 mb-2"><div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-cyan-400 text-white grid place-items-center shadow-md"><Icon name={chapIcon(ch.id)} className="w-6 h-6" /></div><div className="text-sm text-brand-600 dark:text-brand-300 font-semibold">Chapter {ch.num}{sc?'  ·  Best '+pct(sc.best,sc.total)+'%':''}</div></div>
    <h1 className="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">{ch.title}</h1>
    <p className="text-slate-500 dark:text-slate-400 mt-1">{ch.subtitle}</p>
    <div className="flex flex-wrap gap-3 mt-5 mb-4">
      <button onClick={()=>go('quiz',ch.id)} className="px-5 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold transition inline-flex items-center gap-2">Start the {ch.num===4?'':''}quiz ({QUESTIONS[ch.id].length} questions) <Icon name="arrow" className="w-4 h-4" /></button>
      {ch.num<CHAPTERS.length && <button onClick={()=>go('chapter','ch'+(ch.num+1))} className="px-5 py-2.5 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-semibold hover:border-brand-400 transition">Next chapter</button>}
    </div>
    <div className="h-px bg-slate-200 dark:bg-slate-800 my-2"></div>
    <article>{ch.sections.map((s,i)=><Section key={i} s={s} />)}</article>
    <div className="mt-10 rounded-2xl bg-brand-50 dark:bg-brand-500/10 border border-brand-200 dark:border-brand-500/30 p-6 text-center">
      <div className="font-bold text-lg">Ready to test yourself?</div>
      <p className="text-sm text-slate-600 dark:text-slate-300 mt-1">Take the {QUESTIONS[ch.id].length}-question quiz for this chapter. A timer runs while you answer.</p>
      <button onClick={()=>go('quiz',ch.id)} className="mt-4 px-6 py-3 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold transition">Start quiz</button>
    </div>
  </div>);
}

/* ---------------- quiz view (timer always on) ---------------- */
function QuizView({questions,title,subtitle,countdown,onComplete,onExit}){
  const total=questions.length;
  const [order,setOrder]=useState(()=>questions.map((_,i)=>i));
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const [locked,setLocked]=useState(false);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const [shuffled,setShuffled]=useState(false);
  const [seconds,setSeconds]=useState(countdown||0);
  const reported=useRef(false);

  const q=questions[order[idx]];

  function finish(){ setDone(true); }

  useEffect(()=>{ if(done) return undefined; const t=setInterval(()=>setSeconds(s=> countdown ? s-1 : s+1 ),1000); return ()=>clearInterval(t); },[done,countdown]);
  useEffect(()=>{ if(countdown && !done && seconds<=0){ finish(); } },[seconds,countdown,done]);
  useEffect(()=>{ if(done && !reported.current){ reported.current=true; if(onComplete) onComplete(score,total); } },[done]);

  function submit(){ if(locked||picked==null) return; setLocked(true); setAnswers(a=>{ const n={...a}; n[order[idx]]=picked; return n; }); if(picked===q.answer){ setScore(s=>s+1); beep(true); } else { beep(false); } }
  function next(){ if(idx+1>=total){ finish(); return; } setIdx(idx+1); setPicked(null); setLocked(false); }
  function restart(reshuffle){ const o=reshuffle?shuffle(questions.map((_,i)=>i)):questions.map((_,i)=>i); setOrder(o); setIdx(0); setPicked(null); setLocked(false); setAnswers({}); setScore(0); setDone(false); setShuffled(reshuffle); setSeconds(countdown||0); reported.current=false; }

  const timeUsed = countdown ? (countdown - seconds) : seconds;
  const lowTime = countdown && seconds<=60 && !done;

  if(done){
    const p=pct(score,total);
    const good=p>=70;
    return (<div className="animate-fadeIn max-w-2xl mx-auto">
      <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-8 text-center">
        <div className="text-sm font-semibold text-slate-400">{title} · Results</div>
        <div className={'mx-auto my-4 w-32 h-32 rounded-full grid place-items-center text-4xl font-extrabold '+(good?'bg-emerald-50 text-emerald-600 dark:bg-emerald-500/10 dark:text-emerald-300':'bg-brand-50 text-brand-600 dark:bg-brand-500/10 dark:text-brand-300')}>{p}%</div>
        <div className="text-lg font-bold">{score} / {total} correct</div>
        <div className="text-sm text-slate-400 mt-1 inline-flex items-center gap-1"><Icon name="clock" className="w-4 h-4" /> Time used {fmtTime(timeUsed)}</div>
        <div className="flex flex-wrap gap-3 justify-center mt-6">
          <button onClick={()=>restart(false)} className="px-5 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold transition inline-flex items-center gap-2"><Icon name="refresh" className="w-4 h-4" />Retry</button>
          <button onClick={()=>restart(true)} className="px-5 py-2.5 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-semibold hover:border-brand-400 transition inline-flex items-center gap-2"><Icon name="shuffle" className="w-4 h-4" />Shuffle &amp; retry</button>
          <button onClick={onExit} className="px-5 py-2.5 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-semibold hover:border-brand-400 transition">Done</button>
        </div>
      </div>
      <h3 className="font-bold text-lg mt-8 mb-3">Review all answers</h3>
      <div className="space-y-3">
        {order.map((qi,n)=>{ const qq=questions[qi]; const ua=answers[qi]; const correct=ua===qq.answer; return (
          <div key={qi} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4">
            <div className="font-medium">{n+1}. {qq.q}</div>
            <div className="mt-2 space-y-1 text-sm">{qq.options.map((op,oi)=>{ const isAns=oi===qq.answer; const isUser=oi===ua; return (<div key={oi} className={'px-3 py-1.5 rounded-lg '+(isAns?'bg-emerald-50 dark:bg-emerald-500/15 text-emerald-700 dark:text-emerald-300 font-medium':(isUser?'bg-rose-50 dark:bg-rose-500/15 text-rose-700 dark:text-rose-300':'text-slate-600 dark:text-slate-300'))}>{LETTERS[oi]}. {op}{isAns?'  (correct)':''}{isUser&&!isAns?'  (your answer)':''}</div>); })}</div>
            {ua===undefined && <div className="text-xs text-slate-400 mt-1">(not answered)</div>}
            <div className="text-sm mt-2 text-slate-500 dark:text-slate-400"><span className="font-semibold text-brand-600 dark:text-brand-300">Why: </span>{qq.explanation}</div>
          </div>); })}
      </div>
    </div>);
  }

  return (<div className="animate-fadeIn max-w-2xl mx-auto">
    <div className="flex items-center justify-between mb-3">
      <button onClick={onExit} className="text-sm text-slate-500 hover:text-brand-600 inline-flex items-center gap-1"><Icon name="x" className="w-4 h-4" />Exit</button>
      <div className={'inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-semibold '+(lowTime?'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-300 animate-pop':'bg-brand-100 text-brand-700 dark:bg-brand-500/20 dark:text-brand-200')}><Icon name="clock" className="w-4 h-4" />{countdown?fmtTime(seconds):fmtTime(seconds)}{countdown?' left':''}</div>
    </div>
    <div className="text-sm font-semibold text-brand-600 dark:text-brand-300">{title}</div>
    <div className="flex justify-between items-center text-sm text-slate-400 mt-1 mb-2"><span>Question {idx+1} of {total}</span><span>Score {score}</span></div>
    <ProgressBar value={pct(idx,total)} />

    <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 mt-4">
      <div className="text-lg font-semibold leading-snug">{q.q}</div>
      <div className="mt-4 space-y-2.5">
        {q.options.map((op,oi)=>{ let cls='border-slate-200 dark:border-slate-700 hover:border-brand-400 hover:bg-brand-50/50 dark:hover:bg-slate-800';
          if(locked){ if(oi===q.answer) cls='border-emerald-400 bg-emerald-50 dark:bg-emerald-500/15'; else if(oi===picked) cls='border-rose-400 bg-rose-50 dark:bg-rose-500/15 animate-shake'; else cls='border-slate-200 dark:border-slate-800 opacity-60'; }
          else if(oi===picked) cls='border-brand-500 bg-brand-50 dark:bg-brand-500/15';
          return (<button key={oi} disabled={locked} onClick={()=>setPicked(oi)} className={'w-full text-left px-4 py-3 rounded-xl border-2 transition flex gap-3 items-start '+cls}><span className="flex-none w-6 h-6 rounded-md bg-slate-100 dark:bg-slate-800 text-xs font-bold grid place-items-center mt-0.5">{LETTERS[oi]}</span><span>{op}</span></button>); })}
      </div>
      {locked && (<div className={'mt-4 rounded-xl p-4 '+(picked===q.answer?'bg-emerald-50 dark:bg-emerald-500/10':'bg-rose-50 dark:bg-rose-500/10')}><div className={'font-bold text-sm '+(picked===q.answer?'text-emerald-700 dark:text-emerald-300':'text-rose-700 dark:text-rose-300')}>{picked===q.answer?'Correct!':'Not quite — correct answer is '+LETTERS[q.answer]+'.'}</div><div className="text-sm text-slate-600 dark:text-slate-300 mt-1">{q.explanation}</div></div>)}
      <div className="mt-5 flex justify-end gap-3">
        {!locked && <button onClick={submit} disabled={picked==null} className={'px-5 py-2.5 rounded-xl font-semibold transition '+(picked==null?'bg-slate-200 dark:bg-slate-800 text-slate-400 cursor-not-allowed':'bg-brand-500 hover:bg-brand-600 text-white')}>Submit</button>}
        {locked && <button onClick={next} className="px-5 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold transition inline-flex items-center gap-2">{idx+1>=total?'Finish':'Next'}<Icon name="arrow" className="w-4 h-4" /></button>}
      </div>
    </div>
  </div>);
}

/* ---------------- search view ---------------- */
function SearchView({query,go}){
  const ql=query.trim().toLowerCase();
  const res=useMemo(()=>{ if(!ql) return {content:[],qs:[]};
    const content=[]; const qs=[];
    CHAPTERS.forEach(ch=>{ ch.sections.forEach((s,i)=>{ const t=sectionText(s); if(t && t.toLowerCase().includes(ql)){ content.push({chId:ch.id,chNum:ch.num,heading:sectionHeading(ch,i),text:t}); } }); });
    Object.keys(QUESTIONS).forEach(k=>{ QUESTIONS[k].forEach(qq=>{ const blob=(qq.q+' '+qq.options.join(' ')+' '+qq.explanation); if(blob.toLowerCase().includes(ql)){ qs.push({set:k,q:qq}); } }); });
    return {content:content.slice(0,40),qs:qs.slice(0,30)};
  },[ql]);
  const setLabel=k=>k==='final'?'Final Exam':('Chapter '+(chapterById(k)?chapterById(k).num:k));
  return (<div className="animate-fadeIn max-w-3xl mx-auto">
    <h1 className="text-2xl font-bold">Search results</h1>
    <p className="text-slate-400 text-sm mt-1">{res.content.length+res.qs.length} matches for “{query}”</p>
    {res.content.length>0 && <h2 className="font-bold mt-6 mb-2">In study guides</h2>}
    <div className="space-y-2">{res.content.map((r,i)=>(<button key={i} onClick={()=>go('chapter',r.chId)} className="block w-full text-left rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 hover:border-brand-400 transition"><div className="text-xs font-semibold text-brand-600 dark:text-brand-300">Chapter {r.chNum} · {r.heading}</div><div className="text-sm text-slate-600 dark:text-slate-300 mt-1 line-clamp-2">{highlight(r.text.slice(0,240),query)}</div></button>))}</div>
    {res.qs.length>0 && <h2 className="font-bold mt-6 mb-2">In questions</h2>}
    <div className="space-y-2">{res.qs.map((r,i)=>(<div key={i} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4"><div className="text-xs font-semibold text-brand-600 dark:text-brand-300">{setLabel(r.set)}</div><div className="text-sm font-medium mt-1">{highlight(r.q.q,query)}</div><div className="text-sm text-emerald-700 dark:text-emerald-300 mt-1">{LETTERS[r.q.answer]}. {r.q.options[r.q.answer]}</div></div>))}</div>
    {res.content.length===0 && res.qs.length===0 && <div className="text-center text-slate-400 py-16">No matches. Try another term.</div>}
  </div>);
}

/* ---------------- app ---------------- */
function App(){
  const [view,setView]=useState('home');
  const [chId,setChId]=useState('ch1');
  const [dark,setDark]=useState(()=>{ try{ return localStorage.getItem('studymartin_dark')==='1'; }catch(e){ return false; } });
  const [store,setStore]=useState(loadStore);
  const [query,setQuery]=useState('');
  const [open,setOpen]=useState(false);

  useEffect(()=>{ const el=document.documentElement; if(dark) el.classList.add('dark'); else el.classList.remove('dark'); try{ localStorage.setItem('studymartin_dark',dark?'1':'0'); }catch(e){} },[dark]);

  function recordScore(id,score,total){ setStore(prev=>{ const s={scores:Object.assign({},prev.scores),completed:Object.assign({},prev.completed)}; const old=s.scores[id]||{best:0,last:0,total:total}; s.scores[id]={best:Math.max(old.best,score),last:score,total:total}; s.completed[id]=true; saveStore(s); return s; }); }
  function go(v,id){ setView(v); if(id) setChId(id); if(v!=='search'){ /* keep query for search only */ } window.scrollTo(0,0); }

  const ch=chapterById(chId)||CHAPTERS[0];
  let content;
  if(view==='home') content=<Home go={go} store={store} />;
  else if(view==='chapter') content=<ChapterView ch={ch} go={go} store={store} />;
  else if(view==='quiz') content=<QuizView key={chId} questions={QUESTIONS[chId]} title={'Chapter '+ch.num+' Quiz'} countdown={0} onComplete={(sc,tot)=>recordScore(chId,sc,tot)} onExit={()=>go('chapter',chId)} />;
  else if(view==='final') content=<QuizView key="final" questions={QUESTIONS.final} title="Final Exam" countdown={FINAL_SECONDS} onComplete={(sc,tot)=>recordScore('final',sc,tot)} onExit={()=>go('home')} />;
  else if(view==='search') content=<SearchView query={query} go={go} />;

  return (<div className="flex min-h-screen">
    {open && <div className="fixed inset-0 bg-black/30 z-30 md:hidden" onClick={()=>setOpen(false)}></div>}
    <Sidebar view={view} chId={chId} go={go} open={open} setOpen={setOpen} />
    <div className="flex-1 min-w-0 flex flex-col">
      <Topbar query={query} setQuery={setQuery} go={go} dark={dark} setDark={setDark} setOpen={setOpen} />
      <main className="flex-1 px-4 md:px-8 py-8 max-w-5xl w-full mx-auto">{content}</main>
      <footer className="px-8 py-6 text-center text-xs text-slate-400 border-t border-slate-200 dark:border-slate-800">StudyMartin · Introduction to Computer Security (Matt Bishop) · Progress saved in your browser</footer>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
