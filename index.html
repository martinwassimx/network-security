<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StudyMartin</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; background: #f8fafc; }
  #loading h2 { color: #0ea5e9; margin: 0 0 1rem 0; }
  #loading p { color: #64748b; margin: 0.5rem 0; }
  .spinner { border: 4px solid #e0f2fe; border-top: 4px solid #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 1rem; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  #error { display: none; color: #dc2626; background: #fee; padding: 1rem; margin: 1rem; border-radius: 8px; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <h2>Loading StudyMartin...</h2>
  <p id="status">Initializing libraries...</p>
</div>
<div id="error"></div>
<div id="root"></div>
​
<script>
  window.onerror = function(msg, url, line, col, error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = '<strong>Error:</strong> ' + msg + '<br>Line: ' + line + '<br><br>Please check that you have an internet connection and try refreshing the page.';
    console.error('Global error:', msg, error);
    return false;
  };
  
  function updateStatus(msg) {
    var el = document.getElementById('status');
    if (el) el.textContent = msg;
    console.log('Status:', msg);
  }
</script>
​
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin onload="updateStatus('React loaded')"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin onload="updateStatus('ReactDOM loaded')"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin onload="updateStatus('Babel loaded')"></script>
<script src="https://cdn.tailwindcss.com" onload="updateStatus('Tailwind loaded')"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: { brand: {50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e'} },
      fontFamily: { sans: ['Inter','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] }
    } }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;}
  body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .animate-fadeIn{animation:fadeIn .4s ease both}
  .animate-slideUp{animation:slideUp .45s ease both}
  .animate-pop{animation:pop .35s ease}
  .animate-shake{animation:shake .4s ease}
  .hero-bg{background:linear-gradient(135deg,#e0f2fe 0%,#f0f9ff 45%,#ecfeff 100%)}
  .dark .hero-bg{background:linear-gradient(135deg,rgba(14,165,233,.16) 0%,rgba(2,132,199,.10) 50%,rgba(8,47,73,.30) 100%)}
  .gradient-text{background:linear-gradient(90deg,#0ea5e9,#06b6d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  ::selection{background:#bae6fd;color:#0c4a6e}
  .card-hover{transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease}
  .card-hover:hover{transform:translateY(-4px)}
  *{scrollbar-width:thin}
</style>
​
<script>
updateStatus('Loading chapter data...');
window.CHAPTERS = [{id:'ch1',num:1,title:'Chapter 1',subtitle:'Test',readMins:10,sections:[{type:'intro',text:'Test chapter'}]}];
updateStatus('Loading question data...');
window.QUESTIONS = {ch1:[{q:'Test?',options:['A','B','C','D'],answer:0,explanation:'Test'}],final:[]};
updateStatus('Data loaded, starting app...');
</script>
​
<script type="text/babel">
try {
  updateStatus('Compiling React app...');
  
  const {useState} = React;
  
  function App() {
    const [ready, setReady] = useState(false);
    
    React.useEffect(() => {
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        setReady(true);
      }, 500);
    }, []);
    
    if (!ready) return null;
    
    return (
      <div className="min-h-screen bg-slate-50 p-8">
        <div className="max-w-4xl mx-auto">
          <div className="hero-bg rounded-3xl px-8 py-14 text-center">
            <h1 className="text-4xl font-extrabold text-slate-900">StudyMartin is Working!</h1>
            <p className="text-lg text-slate-600 mt-4">The app loaded successfully.</p>
            <p className="text-sm text-slate-500 mt-2">Chapters: {window.CHAPTERS?.length || 0}</p>
            <p className="text-sm text-slate-500">Questions: {Object.keys(window.QUESTIONS || {}).length} sets</p>
          </div>
          
          <div className="mt-8 bg-white rounded-2xl p-6 shadow">
            <h2 className="text-2xl font-bold mb-4">✓ All systems operational</h2>
            <ul className="space-y-2 text-slate-700">
              <li>✓ React loaded</li>
              <li>✓ Data loaded</li>
              <li>✓ Tailwind CSS working</li>
              <li>✓ App rendered</li>
            </ul>
            <p className="mt-4 text-sm text-slate-500">If you see this message, the file is working correctly. The full app will be in the next version.</p>
          </div>
        </div>
      </div>
    );
  }
  
  updateStatus('Mounting React app...');
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  updateStatus('App mounted successfully!');
  
} catch (error) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').innerHTML = '<strong>React Error:</strong> ' + error.message + '<br><br>' + error.stack;
  console.error('React error:', error);
}
</script>
</body>
</html>
